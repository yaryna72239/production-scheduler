<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCADA 生產排程控制系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #1a1a2e;
            --bg-panel: #16213e;
            --bg-card: #0f3460;
            --bg-input: #1e293b;
            --border: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-yellow: #f59e0b;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --success: #22c55e;
            --warning: #f97316;
            --danger: #dc2626;
            --sidebar-width: 280px;
            --header-height: 64px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-size: 13px;
            line-height: 1.5;
            overflow: hidden;
        }

        /* Layout */
        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(90deg, var(--bg-panel) 0%, var(--bg-card) 100%);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-cyan) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--text-primary) 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-sub {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 20px;
        }

        .nav-section-title {
            padding: 8px 12px;
            font-size: 10px;
            font-weight: 700;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-section-title::before {
            content: '';
            width: 3px;
            height: 12px;
            background: var(--accent-cyan);
            border-radius: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 0;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 8px;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(59, 130, 246, 0.1);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%);
            color: var(--accent-cyan);
            border-left-color: var(--accent-cyan);
        }

        .nav-item i {
            width: 20px;
            text-align: center;
            font-size: 16px;
        }

        .system-status {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
        }

        .status-text {
            font-weight: 600;
            color: var(--success);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            height: var(--header-height);
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .page-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .page-title h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-online {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.4);
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-cyan) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            justify-content: center;
            font-size: 16px;
        }

        /* Dashboard Grid */
        .dashboard {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: auto auto 1fr;
            gap: 20px;
        }

        /* Cards */
        .card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title i {
            color: var(--accent-cyan);
        }

        .card-body {
            padding: 20px;
        }

        /* Control Value Cards */
        .control-card {
            background: linear-gradient(135deg, var(--bg-panel) 0%, var(--bg-card) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .control-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .control-card.blue::before { background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan)); }
        .control-card.green::before { background: linear-gradient(90deg, var(--accent-green), #34d399); }
        .control-card.yellow::before { background: linear-gradient(90deg, var(--accent-yellow), #fbbf24); }
        .control-card.purple::before { background: linear-gradient(90deg, var(--accent-purple), #a78bfa); }

        .control-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .control-value {
            font-size: 36px;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            margin-bottom: 16px;
        }

        .control-card.blue .control-value { color: var(--accent-cyan); }
        .control-card.green .control-value { color: var(--accent-green); }
        .control-card.yellow .control-value { color: var(--accent-yellow); }
        .control-card.purple .control-value { color: var(--accent-purple); }

        .control-input-group {
            display: flex;
            gap: 8px;
        }

        .control-input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Courier New', monospace;
            text-align: center;
        }

        .control-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .control-btn.set {
            background: var(--accent-blue);
            color: white;
        }

        .control-btn.set:hover {
            background: var(--accent-cyan);
        }

        /* Toggle Switches */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }

        .switch-container:last-child {
            border-bottom: none;
        }

        .switch-label {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .switch-icon {
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-cyan);
        }

        .switch-text {
            font-weight: 600;
        }

        .switch-sub {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .toggle-switch {
            position: relative;
            width: 56px;
            height: 28px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-input);
            border-radius: 28px;
            transition: 0.3s;
            border: 1px solid var(--border);
        }

        .toggle-slider::before {
            position: absolute;
            content: '';
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: var(--text-secondary);
            border-radius: 50%;
            transition: 0.3s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: rgba(34, 197, 94, 0.3);
            border-color: var(--success);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(28px);
            background: var(--success);
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
        }

        /* Gantt Chart */
        .gantt-section {
            grid-column: span 3;
        }

        .gantt-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .gantt-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            padding: 4px;
            border-radius: 8px;
        }

        .gantt-nav-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .gantt-nav-btn:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .gantt-date {
            padding: 0 16px;
            font-weight: 600;
            min-width: 140px;
            text-align: center;
        }

        .gantt-chart {
            display: flex;
            height: 300px;
            background: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
        }

        .gantt-tasks {
            width: 200px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        .gantt-task-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .gantt-task-item:hover {
            background: var(--bg-input);
        }

        .gantt-task-item.selected {
            background: rgba(59, 130, 246, 0.2);
            border-left: 3px solid var(--accent-blue);
        }

        .gantt-task-id {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .gantt-task-name {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .gantt-timeline {
            flex: 1;
            position: relative;
            overflow-x: auto;
        }

        .gantt-header-row {
            display: flex;
            height: 40px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
        }

        .gantt-day {
            width: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border);
            font-size: 11px;
        }

        .gantt-day-name {
            color: var(--text-secondary);
        }

        .gantt-day-num {
            font-weight: 600;
        }

        .gantt-bars-container {
            position: relative;
            min-width: 840px;
        }

        .gantt-bar-row {
            height: 50px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .gantt-bar {
            position: absolute;
            height: 32px;
            top: 9px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .gantt-bar:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        .gantt-bar.pending {
            background: linear-gradient(90deg, var(--accent-yellow), #fbbf24);
            color: #000;
        }

        .gantt-bar.progress {
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
            color: white;
        }

        .gantt-bar.complete {
            background: linear-gradient(90deg, var(--accent-green), #34d399);
            color: white;
        }

        /* Quick Actions Panel */
        .quick-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-btn-large {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .action-btn-large:hover {
            background: var(--bg-input);
            border-color: var(--accent-cyan);
            transform: translateX(4px);
        }

        .action-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .action-icon.blue { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
        .action-icon.green { background: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
        .action-icon.yellow { background: rgba(245, 158, 11, 0.2); color: var(--accent-yellow); }
        .action-icon.red { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }

        .action-text {
            flex: 1;
        }

        .action-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .action-desc {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow: hidden;
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--bg-card);
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 18px;
        }

        .modal-close:hover {
            background: var(--accent-red);
            color: white;
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: calc(90vh - 160px);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.2);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-card);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-microchip"></i>
                    </div>
                    <div>
                        <div class="logo-text">SCADA</div>
                        <div class="logo-sub">生產控制系統</div>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">主要功能</div>
                    <div class="nav-item active">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>控制面板</span>
                    </div>
                    <div class="nav-item">
                        <i class="fas fa-project-diagram"></i>
                        <span>產線監控</span>
                    </div>
                    <div class="nav-item">
                        <i class="fas fa-clipboard-check"></i>
                        <span>工單管理</span>
                    </div>
                    <div class="nav-item">
                        <i class="fas fa-chart-bar"></i>
                        <span>數據分析</span>
                    </div>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">系統設定</div>
                    <div class="nav-item">
                        <i class="fas fa-sliders-h"></i>
                        <span>參數設定</span>
                    </div>
                    <div class="nav-item">
                        <i class="fas fa-history"></i>
                        <span>操作記錄</span>
                    </div>
                    <div class="nav-item">
                        <i class="fas fa-cog"></i>
                        <span>系統設定</span>
                    </div>
                </div>
            </nav>

            <div class="system-status">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span class="status-text">系統運作中</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="page-title">
                    <h1>生產控制面板</h1>
                    <span class="badge badge-online">● 即時連線中</span>
                </div>

                <div class="top-actions">
                    <button class="btn btn-secondary btn-icon">
                        <i class="fas fa-bell"></i>
                    </button>
                    <button class="btn btn-secondary btn-icon">
                        <i class="fas fa-expand"></i>
                    </button>
                    <button class="btn btn-primary" onclick="openModal()">
                        <i class="fas fa-plus"></i>
                        新增工單
                    </button>
                </div>
            </header>

            <!-- Dashboard -->
            <div class="dashboard">
                <!-- Control Value Cards -->
                <div class="control-card blue">
                    <div class="control-label">目標產量 (件/小時)</div>
                    <div class="control-value" id="target-output">1,250</div>
                    <div class="control-input-group">
                        <input type="number" class="control-input" id="input-target" value="1250" min="0">
                        <button class="control-btn set" onclick="setValue('target', 'input-target', 'target-output')">
                            <i class="fas fa-check"></i>
                        </button>
                    </div>
                </div>

                <div class="control-card green">
                    <div class="control-label">目前產量 (件/小時)</div>
                    <div class="control-value" id="current-output">1,180</div>
                    <div class="control-input-group">
                        <input type="number" class="control-input" id="input-current" value="1180" min="0">
                        <button class="control-btn set" onclick="setValue('current', 'input-current', 'current-output')">
                            <i class="fas fa-check"></i>
                        </button>
                    </div>
                </div>

                <div class="control-card yellow">
                    <div class="control-label">產線速度 (m/min)</div>
                    <div class="control-value" id="line-speed">45.5</div>
                    <div class="control-input-group">
                        <input type="number" class="control-input" id="input-speed" value="45.5" min="0" step="0.1">
                        <button class="control-btn set" onclick="setValue('speed', 'input-speed', 'line-speed')">
                            <i class="fas fa-check"></i>
                        </button>
                    </div>
                </div>

                <div class="control-card purple">
                    <div class="control-label">溫度設定 (°C)</div>
                    <div class="control-value" id="temperature">185.0</div>
                    <div class="control-input-group">
                        <input type="number" class="control-input" id="input-temp" value="185" min="0" step="0.5">
                        <button class="control-btn set" onclick="setValue('temp', 'input-temp', 'temperature')">
                            <i class="fas fa-check"></i>
                        </button>
                    </div>
                </div>

                <!-- Device Controls -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-power-off"></i>
                            設備控制
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="switch-container">
                            <div class="switch-label">
                                <div class="switch-icon">
                                    <i class="fas fa-play"></i>
                                </div>
                                <div>
                                    <div class="switch-text">產線運轉</div>
                                    <div class="switch-sub">主生產線啟動/停止</div>
                                </div>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="switch-line" checked onchange="toggleDevice('line', this.checked)">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>

                        <div class="switch-container">
                            <div class="switch-label">
                                <div class="switch-icon">
                                    <i class="fas fa-fan"></i>
                                </div>
                                <div>
                                    <div class="switch-text">冷卻系統</div>
                                    <div class="switch-sub">冷卻風扇控制</div>
                                </div>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="switch-cool" checked onchange="toggleDevice('cool', this.checked)">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>

                        <div class="switch-container">
                            <div class="switch-label">
                                <div class="switch-icon">
                                    <i class="fas fa-lightbulb"></i>
                                </div>
                                <div>
                                    <div class="switch-text">警示燈號</div>
                                    <div class="switch-sub">狀態指示燈控制</div>
                                </div>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="switch-light" onchange="toggleDevice('light', this.checked)">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>

                        <div class="switch-container">
                            <div class="switch-label">
                                <div class="switch-icon">
                                    <i class="fas fa-robot"></i>
                                </div>
                                <div>
                                    <div class="switch-text">自動模式</div>
                                    <div class="switch-sub">自動化生產控制</div>
                                </div>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" id="switch-auto" checked onchange="toggleDevice('auto', this.checked)">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Gantt Chart -->
                <div class="card gantt-section">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-chart-gantt"></i>
                            生產排程甘特圖
                        </div>
                        <div class="gantt-toolbar">
                            <div class="gantt-nav">
                                <button class="gantt-nav-btn" onclick="changeWeek(-1)">
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                                <span class="gantt-date" id="gantt-date">2024年 3月</span>
                                <button class="gantt-nav-btn" onclick="changeWeek(1)">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body" style="padding: 0;">
                        <div class="gantt-chart">
                            <div class="gantt-tasks" id="gantt-tasks"></div>
                            <div class="gantt-timeline">
                                <div class="gantt-header-row" id="gantt-header"></div>
                                <div class="gantt-bars-container" id="gantt-bars"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-bolt"></i>
                            快速操作
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="quick-actions">
                            <button class="action-btn-large" onclick="emergencyStop()">
                                <div class="action-icon red">
                                    <i class="fas fa-stop-circle"></i>
                                </div>
                                <div class="action-text">
                                    <div class="action-title">緊急停止</div>
                                    <div class="action-desc">立即停止所有產線運作</div>
                                </div>
                                <i class="fas fa-chevron-right" style="color: var(--text-secondary);"></i>
                            </button>

                            <button class="action-btn-large" onclick="resetCounters()">
                                <div class="action-icon yellow">
                                    <i class="fas fa-redo"></i>
                                </div>
                                <div class="action-text">
                                    <div class="action-title">重置計數器</div>
                                    <div class="action-desc">歸零今日生產計數</div>
                                </div>
                                <i class="fas fa-chevron-right" style="color: var(--text-secondary);"></i>
                            </button>

                            <button class="action-btn-large" onclick="exportData()">
                                <div class="action-icon blue">
                                    <i class="fas fa-file-export"></i>
                                </div>
                                <div class="action-text">
                                    <div class="action-title">匯出數據</div>
                                    <div class="action-desc">下載生產報表 CSV</div>
                                </div>
                                <i class="fas fa-chevron-right" style="color: var(--text-secondary);"></i>
                            </button>

                            <button class="action-btn-large" onclick="openModal()">
                                <div class="action-icon green">
                                    <i class="fas fa-plus-circle"></i>
                                </div>
                                <div class="action-text">
                                    <div class="action-title">新增工單</div>
                                    <div class="action-desc">建立新的生產工單</div>
                                </div>
                                <i class="fas fa-chevron-right" style="color: var(--text-secondary);"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">新增工單</h3>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <form id="orderForm" class="modal-body">
                <input type="hidden" id="orderId">

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">工單編號</label>
                        <input type="text" id="orderNo" class="form-input" placeholder="WO-202403-001" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">產品名稱</label>
                        <input type="text" id="productName" class="form-input" placeholder="產品名稱" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">開始日期</label>
                        <input type="date" id="startDate" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">結束日期</label>
                        <input type="date" id="endDate" class="form-input" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">數量</label>
                        <input type="number" id="quantity" class="form-input" placeholder="0" min="1" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">產線</label>
                        <select id="productionLine" class="form-select" required>
                            <option value="">選擇產線</option>
                            <option value="A線">A線</option>
                            <option value="B線">B線</option>
                            <option value="C線">C線</option>
                            <option value="D線">D線</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">狀態</label>
                    <select id="status" class="form-select" required>
                        <option value="pending">待產</option>
                        <option value="progress">生產中</option>
                        <option value="complete">已完成</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">備註</label>
                    <textarea id="note" class="form-textarea" placeholder="備註說明"></textarea>
                </div>
            </form>

            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveOrder()">儲存</button>
            </div>
        </div>
    </div>

    <script>
        // Data
        let orders = JSON.parse(localStorage.getItem('productionOrders') || '[]');
        let currentDate = new Date();
        let deviceStatus = {
            line: true,
            cool: true,
            light: false,
            auto: true
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            if (orders.length === 0) {
                orders = [
                    { id: '1', orderNo: 'WO-202403-001', productName: '產品A-型號X', quantity: 1000, productionLine: 'A線', status: 'progress', startDate: '2024-03-25', endDate: '2024-03-28', note: '優先處理' },
                    { id: '2', orderNo: 'WO-202403-002', productName: '產品B-型號Y', quantity: 500, productionLine: 'B線', status: 'pending', startDate: '2024-03-26', endDate: '2024-03-29', note: '' },
                    { id: '3', orderNo: 'WO-202403-003', productName: '產品C-型號Z', quantity: 2000, productionLine: 'A線', status: 'complete', startDate: '2024-03-20', endDate: '2024-03-24', note: '已完成檢驗' },
                    { id: '4', orderNo: 'WO-202403-004', productName: '產品D-型號W', quantity: 800, productionLine: 'C線', status: 'progress', startDate: '2024-03-27', endDate: '2024-03-30', note: '' }
                ];
                localStorage.setItem('productionOrders', JSON.stringify(orders));
            }
            renderGantt();
            loadDeviceStatus();
        });

        // Control Functions
        function setValue(type, inputId, displayId) {
            const value = document.getElementById(inputId).value;
            const display = document.getElementById(displayId);
            
            // Animate value change
            display.style.opacity = '0';
            setTimeout(() => {
                display.textContent = parseFloat(value).toLocaleString();
                display.style.opacity = '1';
            }, 150);
            
            // Save to localStorage
            localStorage.setItem(`control_${type}`, value);
            
            // Show feedback
            showNotification(`${type} 已設定為 ${value}`);
        }

        function toggleDevice(device, status) {
            deviceStatus[device] = status;
            localStorage.setItem('device_status', JSON.stringify(deviceStatus));
            
            const names = {
                line: '產線運轉',
                cool: '冷卻系統',
                light: '警示燈號',
                auto: '自動模式'
            };
            
            showNotification(`${names[device]} 已${status ? '啟動' : '停止'}`);
        }

        function loadDeviceStatus() {
            const saved = localStorage.getItem('device_status');
            if (saved) {
                deviceStatus = JSON.parse(saved);
                document.getElementById('switch-line').checked = deviceStatus.line;
                document.getElementById('switch-cool').checked = deviceStatus.cool;
                document.getElementById('switch-light').checked = deviceStatus.light;
                document.getElementById('switch-auto').checked = deviceStatus.auto;
            }
            
            // Load control values
            ['target', 'current', 'speed', 'temp'].forEach(type => {
                const saved = localStorage.getItem(`control_${type}`);
                if (saved) {
                    document.getElementById(`input-${type}`).value = saved;
                    document.getElementById(`${type}-output` || `${type === 'target' ? 'target-output' : type === 'current' ? 'current-output' : type === 'speed' ? 'line-speed' : 'temperature'}`).textContent = parseFloat(saved).toLocaleString();
                }
            });
        }

        function emergencyStop() {
            if (confirm('確定要執行緊急停止嗎？這將停止所有產線運作。')) {
                document.getElementById('switch-line').checked = false;
                toggleDevice('line', false);
                showNotification('⚠️ 緊急停止已執行', 'error');
            }
        }

        function resetCounters() {
            if (confirm('確定要重置今日生產計數嗎？')) {
                document.getElementById('input-current').value = '0';
                setValue('current', 'input-current', 'current-output');
                showNotification('計數器已重置');
            }
        }

        function exportData() {
            const csv = convertToCSV(orders);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `production_data_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            showNotification('數據匯出完成');
        }

        function convertToCSV(data) {
            const headers = ['工單編號', '產品名稱', '數量', '產線', '狀態', '開始日期', '結束日期', '備註'];
            const rows = data.map(o => [o.orderNo, o.productName, o.quantity, o.productionLine, o.status, o.startDate, o.endDate, o.note]);
            return [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
        }

        function showNotification(message, type = 'success') {
            // Create notification element
            const notif = document.createElement('div');
            notif.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 16px 24px;
                background: ${type === 'error' ? 'var(--accent-red)' : 'var(--accent-green)'};
                color: white;
                border-radius: 8px;
                font-weight: 600;
                z-index: 9999;
                animation: slideIn 0.3s ease;
            `;
            notif.textContent = message;
            document.body.appendChild(notif);
            
            setTimeout(() => {
                notif.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notif.remove(), 300);
            }, 3000);
        }

        // Gantt Chart
        function renderGantt() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('gantt-date').textContent = `${year}年 ${month + 1}月`;

            // Header
            const header = document.getElementById('gantt-header');
            header.innerHTML = '';
            const startOfWeek = new Date(currentDate);
            startOfWeek.setDate(currentDate.getDate() - currentDate.getDay());
            
            for (let i = 0; i < 14; i++) {
                const day = new Date(startOfWeek);
                day.setDate(startOfWeek.getDate() + i);
                header.innerHTML += `
                    <div class="gantt-day">
                        <div class="gantt-day-name">${['日','一','二','三','四','五','六'][day.getDay()]}</div>
                        <div class="gantt-day-num">${day.getDate()}</div>
                    </div>
                `;
            }

            // Tasks and bars
            const tasksContainer = document.getElementById('gantt-tasks');
            const barsContainer = document.getElementById('gantt-bars');
            tasksContainer.innerHTML = '';
            barsContainer.innerHTML = '';

            orders.forEach(order => {
                tasksContainer.innerHTML += `
                    <div class="gantt-task-item">
                        <div class="gantt-task-id">${order.orderNo}</div>
                        <div class="gantt-task-name">${order.productName}</div>
                    </div>
                `;

                const orderStart = new Date(order.startDate);
                const orderEnd = new Date(order.endDate);
                const dayWidth = 60;
                let startOffset = (orderStart - startOfWeek) / (1000 * 60 * 60 * 24);
                let duration = (orderEnd - orderStart) / (1000 * 60 * 60 * 24) + 1;
                
                if (startOffset < 0) { duration += startOffset; startOffset = 0; }
                if (startOffset + duration > 14) duration = 14 - startOffset;
                
                barsContainer.innerHTML += `
                    <div class="gantt-bar-row">
                        ${duration > 0 ? `
                            <div class="gantt-bar ${order.status}" 
                                 style="left: ${startOffset * dayWidth}px; width: ${duration * dayWidth - 10}px;">
                                ${order.orderNo}
                            </div>
                        ` : ''}
                    </div>
                `;
            });
        }

        function changeWeek(delta) {
            currentDate.setDate(currentDate.getDate() + delta * 7);
            renderGantt();
        }

        // Modal
        function openModal() {
            document.getElementById('modal').classList.add('active');
            document.getElementById('orderForm').reset();
            document.getElementById('orderId').value = '';
            document.getElementById('modal-title').textContent = '新增工單';
            document.getElementById('startDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('endDate').value = new Date().toISOString().split('T')[0];
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function saveOrder() {
            const form = document.getElementById('orderForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const orderData = {
                id: document.getElementById('orderId').value || Date.now().toString(),
                orderNo: document.getElementById('orderNo').value,
                productName: document.getElementById('productName').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                quantity: document.getElementById('quantity').value,
                productionLine: document.getElementById('productionLine').value,
                status: document.getElementById('status').value,
                note: document.getElementById('note').value
            };

            const existingIndex = orders.findIndex(o => o.id === orderData.id);
            if (existingIndex >= 0) {
                orders[existingIndex] = orderData;
            } else {
                orders.push(orderData);
            }

            localStorage.setItem('productionOrders', JSON.stringify(orders));
            closeModal();
            renderGantt();
            showNotification('工單已儲存');
        }

        // Close modal on overlay click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Add animation styles
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
