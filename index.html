<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生產排程管理系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #e0e7ff;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --purple: #8b5cf6;
            --orange: #f97316;
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 24px;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-header {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-header.secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .btn-header.secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .btn-header.primary {
            background: #22c55e;
            color: white;
        }

        .btn-header.primary:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            background: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-input i {
            color: var(--text-secondary);
        }

        .search-input input {
            border: none;
            outline: none;
            font-size: 14px;
            width: 100%;
        }

        .btn-search {
            padding: 12px 24px;
            background: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-clear {
            padding: 12px 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--warning);
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .btn-edit-card {
            width: 32px;
            height: 32px;
            border: none;
            background: #f1f5f9;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .btn-edit-card:hover {
            background: var(--primary);
            color: white;
        }

        .project-id {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .project-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .project-client {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 12px;
        }

        .project-info {
            background: #f8fafc;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px dashed #e2e8f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .info-label i {
            width: 16px;
            color: var(--primary);
        }

        .info-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), #4ade80);
            border-radius: 3px;
            transition: width 0.5s;
        }

        .progress-text {
            text-align: right;
            font-size: 12px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div id="mainView">
        <header class="header">
            <div class="header-top">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-industry"></i>
                    </div>
                    <div class="logo-text">生產排程管理系統</div>
                </div>
                <div class="header-actions">
                    <button class="btn-header secondary">
                        <i class="fas fa-home"></i>
                        回主系統
                    </button>
                    <button class="btn-header primary" onclick="openNewProjectModal()">
                        <i class="fas fa-plus"></i>
                        新增專案
                    </button>
                </div>
            </div>

            <div class="search-bar">
                <div class="search-input">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜尋客戶、產品或聯絡人...">
                </div>
                <div class="search-input">
                    <i class="fas fa-filter"></i>
                    <input type="text" placeholder="進一步篩選 (可留空)">
                </div>
                <button class="btn-search">
                    <i class="fas fa-search"></i>
                    搜尋
                </button>
                <button class="btn-clear">
                    <i class="fas fa-times"></i>
                    清除
                </button>
                <button class="btn-header secondary">
                    <i class="fas fa-users"></i>
                    人員查詢
                </button>
            </div>
        </header>

        <div class="container">
            <div class="projects-grid" id="projectsGrid">
                <div style="text-align:center;padding:60px;color:#666;">載入中...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        // Supabase 設定
        const SUPABASE_URL = 'https://rbtkdhmpaiufirvkexwn.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJidGtkaG1wYWl1ZmlydmtleHduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTIxOTQsImV4cCI6MjA5MDQyODE5NH0.T-M79J0-gNoKZF2XLoGuFDHn41VDL46XMyDk99ucZmw';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // 全域資料
        let projects = [];
        let customers = [];
        let vendors = [];
        
        // Helper function to get day of week
        function getDayOfWeek(dateStr) {
            if (!dateStr) return '-';
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return '-';
            return '星期' + days[date.getDay()];
        }

        // Render Project Cards
        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            if (!projects || projects.length === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:60px;color:#666;">暫無資料</div>';
                return;
            }
            grid.innerHTML = projects.map(project => {
                const deliveryDay = getDayOfWeek(project.deliveryDate);
                return `
                <div class="project-card" onclick="openProject('${project.id}')">
                    <div class="card-header">
                        <span class="project-id">${project.id}</span>
                        <button class="btn-edit-card" onclick="event.stopPropagation(); editProject('${project.id}')" title="編輯">
                            <i class="fas fa-edit"></i>
                        </button>
                    </div>
                    <div class="project-name">${project.name}</div>
                    <div class="project-client">
                        <i class="fas fa-building"></i>
                        ${project.client} / ${project.contact}
                    </div>
                    <div class="project-info">
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-calendar"></i> 開始日期</span>
                            <span class="info-value">${project.startDate || '-'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-sort-numeric-up"></i> 數量</span>
                            <span class="info-value">${(project.totalQuantity || 0).toLocaleString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-calendar-check"></i> 交期</span>
                            <span class="info-value">${project.deliveryDate || '-'} (${deliveryDay})</span>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${project.progress || 0}%"></div>
                    </div>
                    <div class="progress-text">${project.progress || 0}% 完成</div>
                </div>
            `}).join('');
        }

        // 從 Supabase 載入資料
        async function loadData() {
            try {
                console.log('開始載入資料...');
                
                // 載入客戶資料
                const { data: customersData, error: customersError } = await supabaseClient
                    .from('customers')
                    .select('*');
                if (customersError) console.error('客戶資料錯誤:', customersError);
                else customers = customersData || [];
                console.log('客戶資料:', customers.length, '筆');
                
                // 載入廠商資料
                const { data: vendorsData, error: vendorsError } = await supabaseClient
                    .from('vendors')
                    .select('*');
                if (vendorsError) console.error('廠商資料錯誤:', vendorsError);
                else vendors = vendorsData || [];
                console.log('廠商資料:', vendors.length, '筆');
                
                // 載入訂單資料（簡化查詢，不使用關聯）
                const { data: ordersData, error: ordersError } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (ordersError) {
                    console.error('訂單資料錯誤:', ordersError);
                    throw ordersError;
                }
                
                console.log('訂單資料:', ordersData ? ordersData.length : 0, '筆');
                
                // 載入產品資料
                const { data: productsData, error: productsError } = await supabaseClient
                    .from('products')
                    .select('*');
                if (productsError) console.error('產品資料錯誤:', productsError);
                const products = productsData || [];
                console.log('產品資料:', products.length, '筆');
                
                // 轉換資料格式
                projects = (ordersData || []).map(order => {
                    const customer = customers.find(c => c.id === order.customer_id);
                    const product = products.find(p => p.id === order.product_id);
                    const vendor = vendors.find(v => v.id === order.vendor_id);
                    
                    return {
                        id: order.order_no,
                        name: product ? product.name : '未命名產品',
                        client: customer ? customer.name : '未知客戶',
                        contact: customer ? customer.contact_person : '',
                        status: mapStatus(order.customer_status),
                        statusText: order.customer_status,
                        progress: order.customer_progress || 0,
                        startDate: order.created_at ? order.created_at.split('T')[0] : '',
                        totalQuantity: order.quantity || 0,
                        deliveryDate: order.deadline || '',
                        vendorName: vendor ? vendor.name : '',
                        vendorStatus: order.vendor_status || '',
                        vendorProgress: order.vendor_progress || 0,
                        notes: order.notes || ''
                    };
                });
                
                console.log('轉換後專案:', projects.length, '筆');
                renderProjects();
                
            } catch (error) {
                console.error('載入資料失敗:', error);
                document.getElementById('projectsGrid').innerHTML = 
                    '<div style="text-align:center;padding:60px;color:#c53030;">載入資料失敗: ' + error.message + '</div>';
            }
        }
        
        // 狀態對應
        function mapStatus(status) {
            const map = {
                '待確認': 'proposal',
                '已確認': 'quote',
                '生產中': 'production',
                '待出貨': 'shipping',
                '已出貨': 'shipping',
                '已完成': 'done'
            };
            return map[status] || 'proposal';
        }

        function openProject(id) {
            alert('查看專案: ' + id);
        }

        function editProject(id) {
            alert('編輯專案: ' + id);
        }

        function openNewProjectModal() {
            alert('新增專案功能');
        }
        
        // 頁面載入時初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM 已載入，開始載入資料...');
            loadData();
        });
    </script>
</body>
</html>
