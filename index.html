<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生產排程管理系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --success: #22c55e; --warning: #f59e0b;
            --bg: #f8fafc; --bg-card: #ffffff; --text: #1e293b; --text-secondary: #64748b; --border: #e2e8f0;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 24px; box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .logo { display: flex; align-items: center; gap: 12px; color: white; }
        .logo-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo-text { font-size: 20px; font-weight: 700; }
        .last-update { font-size: 12px; color: rgba(255,255,255,0.8); margin-left: 12px; }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .btn-header { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-header.secondary { background: rgba(255,255,255,0.2); color: white; }
        .btn-header.primary { background: #22c55e; color: white; }
        .search-bar { display: flex; align-items: center; gap: 12px; }
        .search-input { flex: 1; padding: 12px 16px; background: white; border: none; border-radius: 10px; font-size: 14px; display: flex; align-items: center; gap: 12px; }
        .search-input input { border: none; outline: none; font-size: 14px; width: 100%; }
        .btn-search { padding: 12px 24px; background: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--primary); cursor: pointer; }
        .btn-clear { padding: 12px 20px; background: rgba(255,255,255,0.2); border: none; border-radius: 10px; font-size: 14px; font-weight: 600; color: white; cursor: pointer; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }
        .project-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--border); cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
        .project-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--warning); }
        .project-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .project-id { font-size: 12px; color: var(--text-secondary); font-family: monospace; }
        .project-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
        .project-client { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 14px; margin-bottom: 12px; }
        .project-info { background: #f8fafc; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed #e2e8f0; }
        .info-row:last-child { border-bottom: none; }
        .info-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
        .info-value { font-size: 13px; font-weight: 600; color: var(--text); }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--success), #4ade80); border-radius: 3px; transition: width 0.5s; }
        .progress-text { text-align: right; font-size: 12px; color: var(--text-secondary); }
        .btn-edit-card { width: 32px; height: 32px; border: none; background: #f1f5f9; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all 0.2s; }
        .btn-edit-card:hover { background: var(--primary); color: white; }
        
        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 16px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .modal-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .modal-title i { color: var(--warning); }
        .btn-close { width: 32px; height: 32px; border: none; background: #f1f5f9; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
        .btn-close:hover { background: var(--danger); color: white; }
        .modal-body { padding: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
        .form-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; transition: all 0.2s; }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .modal-footer { display: flex; gap: 12px; padding: 20px 24px; border-top: 1px solid var(--border); }
        .btn-cancel { flex: 1; padding: 12px 24px; border: 1px solid var(--border); background: white; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer; }
        .btn-cancel:hover { background: var(--bg); }
        .btn-save { flex: 1; padding: 12px 24px; border: none; background: var(--primary); border-radius: 10px; font-size: 14px; font-weight: 600; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save:hover { background: var(--primary-dark); }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; }
        
        /* Status message */
        .status-msg { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; z-index: 2000; animation: slideIn 0.3s ease; }
        .status-msg.success { background: #22c55e; color: white; }
        .status-msg.error { background: #ef4444; color: white; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="mainView">
        <header class="header">
            <div class="header-top">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-industry"></i></div>
                    <div class="logo-text">生產排程管理系統</div>
                    <div class="last-update" id="lastUpdateTime"></div>
                </div>
                <div class="header-actions">
                    <button class="btn-header secondary"><i class="fas fa-home"></i>回主系統</button>
                    <button class="btn-header primary" onclick="alert('新增專案')"><i class="fas fa-plus"></i>新增專案</button>
                </div>
            </div>
            <div class="search-bar">
                <div class="search-input"><i class="fas fa-search"></i><input type="text" placeholder="搜尋客戶、產品或聯絡人..."></div>
                <div class="search-input"><i class="fas fa-filter"></i><input type="text" placeholder="進一步篩選..."></div>
                <button class="btn-search"><i class="fas fa-search"></i>搜尋</button>
                <button class="btn-clear">清除</button>
                <button class="btn-header secondary"><i class="fas fa-users"></i>人員查詢</button>
            </div>
        </header>

        <div class="container">
            <div class="projects-grid" id="projectsGrid">
                <div style="text-align:center;padding:60px;color:#666;"><i class="fas fa-spinner fa-spin"></i> 載入中...</div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">
                    <i class="fas fa-pencil-alt"></i>
                    編輯專案
                </div>
                <button class="btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <input type="hidden" id="editOrderId">
                
                <div class="form-group">
                    <label class="form-label">案名</label>
                    <input type="text" class="form-input" id="editName" placeholder="輸入案名">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">聯絡人公司</label>
                        <input type="text" class="form-input" id="editClient" placeholder="輸入公司名稱">
                    </div>
                    <div class="form-group">
                        <label class="form-label">聯絡人姓名</label>
                        <input type="text" class="form-input" id="editContact" placeholder="輸入聯絡人姓名">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">開始日期</label>
                        <input type="date" class="form-input" id="editStartDate">
                    </div>
                    <div class="form-group">
                        <label class="form-label">交期</label>
                        <input type="date" class="form-input" id="editDeliveryDate">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">數量</label>
                    <input type="number" class="form-input" id="editQuantity" placeholder="輸入數量">
                </div>
            </div>
            
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-save" id="saveBtn" onclick="saveEdit()">
                    <i class="fas fa-check"></i>
                    更新
                </button>
            </div>
        </div>
    </div>

    <script>
        // Supabase 設定
        const SUPABASE_URL = 'https://rbtkdhmpaiufirvkexwn.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJidGtkaG1wYWl1ZmlydmtleHduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTIxOTQsImV4cCI6MjA5MDQyODE5NH0.T-M79J0-gNoKZF2XLoGuFDHn41VDL46XMyDk99ucZmw';
        
        let supabaseClient = null;
        let projects = [];
        let customers = [];
        let products = [];

        // 初始化 Supabase
        function initSupabase() {
            if (typeof supabase === 'undefined') {
                showStatus('Supabase 函式庫未載入', 'error');
                return false;
            }
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            return true;
        }

        // 顯示狀態訊息
        function showStatus(msg, type) {
            const div = document.createElement('div');
            div.className = 'status-msg ' + type;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // 從 Supabase 載入資料
        async function loadFromSupabase() {
            if (!supabaseClient) {
                if (!initSupabase()) return;
            }
            
            try {
                document.getElementById('projectsGrid').innerHTML = '<div style="text-align:center;padding:60px;color:#666;"><i class="fas fa-spinner fa-spin"></i> 載入中...</div>';
                
                // 載入客戶資料
                const { data: customersData, error: customersError } = await supabaseClient
                    .from('customers')
                    .select('*');
                if (customersError) throw customersError;
                customers = customersData || [];
                
                // 載入產品資料
                const { data: productsData, error: productsError } = await supabaseClient
                    .from('products')
                    .select('*');
                if (productsError) throw productsError;
                products = productsData || [];
                
                // 載入訂單資料
                const { data: ordersData, error: ordersError } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (ordersError) throw ordersError;
                
                // 轉換資料格式
                projects = (ordersData || []).map(order => {
                    const customer = customers.find(c => c.id === order.customer_id);
                    const product = products.find(p => p.id === order.product_id);
                    
                    return {
                        orderId: order.id,
                        id: order.order_no,
                        name: product ? product.name : '未命名產品',
                        client: customer ? customer.name : '未知客戶',
                        contact: customer ? customer.contact_person : '',
                        customerId: order.customer_id,
                        productId: order.product_id,
                        status: order.customer_status,
                        progress: order.customer_progress || 0,
                        startDate: order.created_at ? order.created_at.split('T')[0] : '',
                        totalQuantity: order.quantity || 0,
                        deliveryDate: order.deadline || '',
                        notes: order.notes || ''
                    };
                });
                
                renderProjects();
                updateLastModifiedTime();
                
            } catch (error) {
                console.error('載入資料失敗:', error);
                document.getElementById('projectsGrid').innerHTML = 
                    '<div style="text-align:center;padding:60px;color:#c53030;">載入失敗: ' + error.message + '</div>';
            }
        }

        function getDayOfWeek(dateStr) {
            if (!dateStr) return '-';
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return '-';
            return '星期' + days[date.getDay()];
        }

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            if (!projects || projects.length === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:60px;color:#666;">暫無資料</div>';
                return;
            }
            grid.innerHTML = projects.map(project => {
                const deliveryDay = getDayOfWeek(project.deliveryDate);
                return `
                <div class="project-card" onclick="viewProject('${project.id}')">
                    <div class="card-header">
                        <span class="project-id">${project.id}</span>
                        <button class="btn-edit-card" onclick="event.stopPropagation(); openEditModal('${project.id}')" title="編輯">
                            <i class="fas fa-edit"></i>
                        </button>
                    </div>
                    <div class="project-name">${project.name}</div>
                    <div class="project-client">
                        <i class="fas fa-building"></i>
                        ${project.client} / ${project.contact}
                    </div>
                    <div class="project-info">
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-calendar"></i> 開始日期</span>
                            <span class="info-value">${project.startDate}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-sort-numeric-up"></i> 數量</span>
                            <span class="info-value">${(project.totalQuantity || 0).toLocaleString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-calendar-check"></i> 交期</span>
                            <span class="info-value">${project.deliveryDate} (${deliveryDay})</span>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${project.progress || 0}%"></div>
                    </div>
                    <div class="progress-text">${project.progress || 0}% 完成</div>
                </div>
            `}).join('');
        }

        function viewProject(id) {
            console.log('查看專案:', id);
        }

        // 開啟編輯視窗
        function openEditModal(id) {
            const project = projects.find(p => p.id === id);
            if (!project) return;
            
            document.getElementById('editId').value = id;
            document.getElementById('editOrderId').value = project.orderId;
            document.getElementById('editName').value = project.name;
            document.getElementById('editClient').value = project.client;
            document.getElementById('editContact').value = project.contact;
            document.getElementById('editStartDate').value = project.startDate;
            document.getElementById('editDeliveryDate').value = project.deliveryDate;
            document.getElementById('editQuantity').value = project.totalQuantity;
            
            document.getElementById('editModal').classList.add('active');
        }

        // 關閉編輯視窗
        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        // 儲存編輯到 Supabase
        async function saveEdit() {
            const orderId = document.getElementById('editOrderId').value;
            const project = projects.find(p => p.orderId === orderId);
            if (!project) return;
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 儲存中...';
            
            try {
                // 更新 customers 表
                if (project.customerId) {
                    const { error: customerError } = await supabaseClient
                        .from('customers')
                        .update({ 
                            name: document.getElementById('editClient').value,
                            contact_person: document.getElementById('editContact').value
                        })
                        .eq('id', project.customerId);
                    
                    if (customerError) throw customerError;
                }
                
                // 更新 products 表
                if (project.productId) {
                    const { error: productError } = await supabaseClient
                        .from('products')
                        .update({ name: document.getElementById('editName').value })
                        .eq('id', project.productId);
                    
                    if (productError) throw productError;
                }
                
                // 更新 orders 表
                const { error: orderError } = await supabaseClient
                    .from('orders')
                    .update({
                        quantity: parseInt(document.getElementById('editQuantity').value) || 0,
                        deadline: document.getElementById('editDeliveryDate').value,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', orderId);
                
                if (orderError) throw orderError;
                
                // 更新本地資料
                project.name = document.getElementById('editName').value;
                project.client = document.getElementById('editClient').value;
                project.contact = document.getElementById('editContact').value;
                project.startDate = document.getElementById('editStartDate').value;
                project.deliveryDate = document.getElementById('editDeliveryDate').value;
                project.totalQuantity = parseInt(document.getElementById('editQuantity').value) || 0;
                
                renderProjects();
                closeModal();
                updateLastModifiedTime();
                showStatus('資料已儲存到資料庫', 'success');
                
            } catch (error) {
                console.error('儲存失敗:', error);
                showStatus('儲存失敗: ' + error.message, 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fas fa-check"></i> 更新';
            }
        }

        // 更新最後更新時間
        function updateLastModifiedTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-TW', { hour12: false,
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            const timeEl = document.getElementById('lastUpdateTime');
            if (timeEl) {
                timeEl.textContent = '最後更新: ' + timeStr;
            }
        }

        // 點擊 modal 外部關閉
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 頁面載入時初始化
        document.addEventListener('DOMContentLoaded', function() {
            initSupabase();
            loadFromSupabase();
        });
    </script>
</body>
</html>
