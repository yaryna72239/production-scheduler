<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生產排程管理系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #e0e7ff;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --purple: #8b5cf6;
            --orange: #f97316;
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 24px;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-header {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-header.secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .btn-header.secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        .btn-header.primary {
            background: #22c55e;
            color: white;
        }

        .btn-header.primary:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }

        /* Stats Bar - Hidden */
        .stats-bar {
            display: none !important;
        }

        .stat-badge {
            display: none !important;
        }

        .update-time {
            display: none !important;
        }

        /* Search Bar */
        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            background: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-input i {
            color: var(--text-secondary);
        }

        .search-input input {
            border: none;
            outline: none;
            font-size: 14px;
            width: 100%;
        }

        .btn-search {
            padding: 12px 24px;
            background: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-clear {
            padding: 12px 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Phase Tabs */
        .phase-tabs {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .phase-tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .phase-tab:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .phase-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .phase-tab i {
            font-size: 16px;
        }

        .phase-divider {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 8px;
        }

        /* Section Title */
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text);
        }

        .section-title i {
            color: var(--warning);
        }

        /* Project Cards Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--warning);
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .project-id {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .project-status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #fef3c7;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #92400e;
        }

        .project-status i {
            font-size: 10px;
        }

        .project-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .project-client {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 12px;
        }

        .project-info {
            background: #f8fafc;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px dashed #e2e8f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .info-label i {
            width: 16px;
            color: var(--primary);
        }

        .info-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .project-meta {
            display: none;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), #4ade80);
            border-radius: 3px;
            transition: width 0.5s;
        }

        .progress-text {
            text-align: right;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .card-actions {
            display: flex;
            gap: 12px;
        }

        .btn-card {
            flex: 1;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-card.success {
            background: var(--success);
            color: white;
        }

        .btn-card.success:hover {
            background: #16a34a;
        }

        .btn-card.warning {
            background: #fef3c7;
            color: #92400e;
        }

        .btn-card.warning:hover {
            background: #fde68a;
        }

        /* Project Detail View (Hidden by default) */
        .detail-view {
            display: none;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .detail-view.active {
            display: block;
        }

        .detail-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .detail-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-back {
            padding: 10px 20px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: var(--border);
        }

        /* Tabs in Detail View */
        .detail-tabs {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
        }

        .detail-tab {
            padding: 16px 24px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .detail-tab:hover {
            color: var(--primary);
        }

        .detail-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Toolbar */
        .detail-toolbar {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .toolbar-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: var(--bg);
            color: var(--text);
        }

        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
        }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table th {
            text-align: left;
            padding: 14px 16px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            background: white;
            white-space: nowrap;
        }

        .data-table th i {
            margin-right: 6px;
        }

        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .data-table tr:hover td {
            background: #f8fafc;
        }

        /* Status Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-done {
            background: #dcfce7;
            color: #166534;
        }

        .status-progress {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-hold {
            background: #fee2e2;
            color: #991b1b;
        }

        /* Priority */
        .priority {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }

        .priority-high {
            background: #fee2e2;
            color: #dc2626;
        }

        .priority-medium {
            background: #fef3c7;
            color: #d97706;
        }

        .priority-low {
            background: #dcfce7;
            color: #16a34a;
        }

        /* Avatar */
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: white;
        }

        .avatar.blue { background: #3b82f6; }
        .avatar.green { background: #22c55e; }
        .avatar.purple { background: #8b5cf6; }
        .avatar.orange { background: #f97316; }

        .user-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Action Button */
        .btn-action {
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-action:hover {
            background: var(--primary-dark);
        }

        /* Add Row */
        .add-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-row:hover {
            background: #f8fafc;
            color: var(--primary);
        }

        /* Checkbox */
        .checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .checkbox:hover {
            border-color: var(--primary);
        }

        .checkbox.checked {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
    </style>
</head>
<body>
    <!-- Main View (Project List) -->
    <div id="mainView">
        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-industry"></i>
                    </div>
                    <div class="logo-text">生產排程管理系統</div>
                </div>
                <div class="header-actions">
                    <button class="btn-header secondary">
                        <i class="fas fa-home"></i>
                        回主系統
                    </button>
                    <button class="btn-header primary" onclick="openNewProjectModal()">
                        <i class="fas fa-plus"></i>
                        新增專案
                    </button>
                </div>
            </div>



            <div class="search-bar">
                <div class="search-input">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜尋客戶、產品或聯絡人...">
                </div>
                <div class="search-input">
                    <i class="fas fa-filter"></i>
                    <input type="text" placeholder="進一步篩選 (可留空)">
                </div>
                <button class="btn-search">
                    <i class="fas fa-search"></i>
                    搜尋
                </button>
                <button class="btn-clear">
                    <i class="fas fa-times"></i>
                    清除
                </button>
                <button class="btn-header secondary">
                    <i class="fas fa-users"></i>
                    人員查詢
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="container">




            <!-- Project Cards -->
            <div class="projects-grid" id="projectsGrid">
                <!-- Cards will be generated by JS -->
            </div>
        </div>
    </div>

    <!-- Detail View (Hidden by default) -->
    <div class="detail-view" id="detailView">
        <div class="detail-header">
            <div class="detail-title">
                <button class="btn-back" onclick="backToMain()">
                    <i class="fas fa-arrow-left"></i>
                    返回專案列表
                </button>
                <h2 id="detailProjectName">專案詳情</h2>
            </div>
        </div>

        <div class="detail-tabs">
            <div class="detail-tab active">工單列表</div>
            <div class="detail-tab">生產排程</div>
            <div class="detail-tab">看板</div>
            <div class="detail-tab">資源管理</div>
            <div class="detail-tab">報表分析</div>
        </div>

        <div class="detail-toolbar">
            <button class="toolbar-btn" title="新增"><i class="fas fa-plus"></i></button>
            <button class="toolbar-btn" title="編輯"><i class="fas fa-edit"></i></button>
            <button class="toolbar-btn" title="刪除"><i class="fas fa-trash"></i></button>
            <div class="toolbar-divider"></div>
            <button class="toolbar-btn" title="篩選"><i class="fas fa-filter"></i></button>
            <button class="toolbar-btn" title="排序"><i class="fas fa-sort"></i></button>
            <div class="toolbar-divider"></div>
            <button class="toolbar-btn" title="匯入"><i class="fas fa-file-import"></i></button>
            <button class="toolbar-btn" title="匯出"><i class="fas fa-file-export"></i></button>
        </div>

        <div style="overflow-x: auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width: 40px;"><div class="checkbox"></div></th>
                        <th><i class="fas fa-hashtag"></i>項次</th>
                        <th><i class="fas fa-flag"></i>階段狀態</th>
                        <th><i class="fas fa-user"></i>負責人</th>
                        <th><i class="fas fa-building"></i>廠商</th>
                        <th><i class="fas fa-chart-line"></i>提案進度</th>
                        <th><i class="fas fa-calendar-alt"></i>工作日曆天數</th>
                        <th><i class="fas fa-calendar"></i>起始日期</th>
                        <th><i class="fas fa-calendar-check"></i>結束日期</th>
                        <th><i class="fas fa-truck"></i>運送天數</th>
                        <th><i class="fas fa-calendar-day"></i>結束日期</th>
                        <th><i class="fas fa-sticky-note"></i>備註</th>
                    </tr>
                </thead>
                <tbody id="detailTableBody">
                    <!-- Data will be inserted by JS -->
                </tbody>
            </table>
            <div class="add-row">
                <i class="fas fa-plus"></i>
                新增工單
            </div>
        </div>
    </div>

    <script>
        // Sample Projects Data
        const projects = [
            {
                id: 'A0010-260317',
                name: '20寸/28寸行李箱+logo印刷',
                client: '高柏科技',
                contact: 'Joanne',
                status: 'proposal',
                statusText: '提案中',
                progress: 0,
                startDate: '2024-03-15',
                totalQuantity: 7000,
                deliveryDate: '2024-04-15',
                orders: [
                    { id: '1', orderNo: 'WO-202403-001', productName: '20寸行李箱外殼', line: 'A線', status: 'pending', priority: 'high', startDate: '2024-03-20', endDate: '2024-03-24', quantity: 2000, assignee: '張明遠' },
                    { id: '2', orderNo: 'WO-202403-002', productName: '28寸行李箱外殼', line: 'B線', status: 'pending', priority: 'high', startDate: '2024-03-25', endDate: '2024-03-28', quantity: 1500, assignee: '李思涵' },
                    { id: '3', orderNo: 'WO-202403-003', productName: 'Logo印刷-熱轉印', line: 'C線', status: 'pending', priority: 'medium', startDate: '2024-03-26', endDate: '2024-03-29', quantity: 3500, assignee: '王建國' }
                ]
            },
            {
                id: 'A0011-260318',
                name: '鋁合金手機支架',
                client: '創新科技',
                contact: 'Alex',
                status: 'quote',
                statusText: '報價中',
                progress: 25,
                startDate: '2024-03-18',
                totalQuantity: 5000,
                deliveryDate: '2024-04-10',
                orders: [
                    { id: '4', orderNo: 'WO-202403-004', productName: '支架底座', line: 'A線', status: 'progress', priority: 'high', startDate: '2024-03-27', endDate: '2024-03-30', quantity: 5000, assignee: '陳雅芳' }
                ]
            },
            {
                id: 'A0012-260319',
                name: 'USB-C 充電線組',
                client: '數位生活',
                contact: '小美',
                status: 'sample',
                statusText: '打樣後',
                progress: 60,
                startDate: '2024-03-20',
                totalQuantity: 20000,
                deliveryDate: '2024-04-20',
                orders: [
                    { id: '5', orderNo: 'WO-202403-005', productName: 'Type-C 線材', line: 'D線', status: 'progress', priority: 'high', startDate: '2024-03-25', endDate: '2024-03-28', quantity: 10000, assignee: '林志豪' },
                    { id: '6', orderNo: 'WO-202403-006', productName: '包裝盒印刷', line: 'B線', status: 'pending', priority: 'low', startDate: '2024-03-28', endDate: '2024-04-01', quantity: 10000, assignee: '黃美玲' }
                ]
            }
        ];

        // Helper function to get day of week
        function getDayOfWeek(dateStr) {
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            const date = new Date(dateStr);
            return '星期' + days[date.getDay()];
        }

        // Render Project Cards
        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = projects.map(project => {
                const deliveryDay = getDayOfWeek(project.deliveryDate);
                return `
                <div class="project-card" onclick="openProject('${project.id}')">
                    <div class="card-header">
                        <span class="project-id">${project.id}</span>
                    </div>
                    <div class="project-name">${project.name}</div>
                    <div class="project-client">
                        <i class="fas fa-building"></i>
                        ${project.client} / ${project.contact}
                    </div>
                    <div class="project-info">
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-calendar"></i> 開始日期</span>
                            <span class="info-value">${project.startDate}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-sort-numeric-up"></i> 數量</span>
                            <span class="info-value">${project.totalQuantity.toLocaleString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-calendar-check"></i> 交期</span>
                            <span class="info-value">${project.deliveryDate} (${deliveryDay})</span>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${project.progress}%"></div>
                    </div>
                    <div class="progress-text">${project.progress}% 完成</div>
                </div>
            `}).join('');
        }

        // Open Project Detail
        function openProject(projectId) {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;

            document.getElementById('detailProjectName').textContent = project.name;
            
            // Render detail table
            const tbody = document.getElementById('detailTableBody');
            tbody.innerHTML = project.orders.map((order, index) => {
                const statusClass = {
                    done: 'status-done',
                    progress: 'status-progress',
                    pending: 'status-pending',
                    hold: 'status-hold'
                }[order.status] || 'status-pending';

                const statusText = {
                    done: '✓ 已完成',
                    progress: '● 進行中',
                    pending: '○ 待產',
                    hold: '◐ 暫停'
                }[order.status] || '待產';

                const priorityClass = {
                    high: 'priority-high',
                    medium: 'priority-medium',
                    low: 'priority-low'
                }[order.priority] || 'priority-medium';

                const priorityText = { high: '高', medium: '中', low: '低' }[order.priority] || '中';

                const colors = ['blue', 'green', 'purple', 'orange'];
                const avatarColor = colors[index % colors.length];

                return `
                    <tr>
                        <td><div class="checkbox"></div></td>
                        <td>${index + 1}</td>
                        <td>${order.orderNo}</td>
                        <td>${order.productName}</td>
                        <td>${order.line}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td><span class="priority ${priorityClass}">${priorityText}</span></td>
                        <td>${order.startDate}</td>
                        <td>${order.endDate}</td>
                        <td>${order.quantity.toLocaleString()}</td>
                        <td>
                            <div class="user-cell">
                                <div class="avatar ${avatarColor}">${order.assignee.charAt(0)}</div>
                                <span>${order.assignee}</span>
                            </div>
                        </td>
                        <td><button class="btn-action">編輯</button></td>
                    </tr>
                `;
            }).join('');

            // Switch views
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('detailView').classList.add('active');
        }

        // Back to Main
        function backToMain() {
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('detailView').classList.remove('active');
        }

        // Project Actions
        function completeProject(id) {
            alert(`專案 ${id} 標記為完成結案`);
        }

        function incompleteProject(id) {
            alert(`專案 ${id} 標記為未完成結案`);
        }

        function openNewProjectModal() {
            alert('新增專案功能');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            renderProjects();
        });
    </script>
</body>
</html>
