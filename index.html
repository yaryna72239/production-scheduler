<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生產排程管理系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
            --bg: #f8fafc; --bg-card: #ffffff; --text: #1e293b; --text-secondary: #64748b; --border: #e2e8f0;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 24px; box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .logo { display: flex; align-items: center; gap: 12px; color: white; cursor: pointer; }
        .logo-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo-text { font-size: 20px; font-weight: 700; }
        .last-update { font-size: 12px; color: rgba(255,255,255,0.8); margin-left: 12px; }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .btn-header { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-header.secondary { background: rgba(255,255,255,0.2); color: white; }
        .btn-header.primary { background: #22c55e; color: white; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        /* 專案卡片樣式 */
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }
        .project-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--border); cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
        .project-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--warning); }
        .project-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .project-id { font-size: 12px; color: var(--text-secondary); font-family: monospace; }
        .project-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
        .project-client { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 14px; margin-bottom: 12px; }
        .project-info { background: #f8fafc; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed #e2e8f0; }
        .info-row:last-child { border-bottom: none; }
        .info-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
        .info-value { font-size: 13px; font-weight: 600; color: var(--text); }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--success), #4ade80); border-radius: 3px; transition: width 0.5s; }
        .progress-text { text-align: right; font-size: 12px; color: var(--text-secondary); }
        .btn-edit-card { width: 32px; height: 32px; border: none; background: #f1f5f9; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all 0.2s; }
        .btn-edit-card:hover { background: var(--primary); color: white; }
        
        /* 工單列表頁面 */
        .workorder-view { display: none; }
        .workorder-view.active { display: block; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: white; font-size: 14px; cursor: pointer; margin-bottom: 16px; }
        .project-title { color: white; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .project-subtitle { color: rgba(255,255,255,0.8); font-size: 14px; }
        
        /* 表格樣式 */
        .table-container { background: white; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden; }
        .table-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .table-title { font-size: 18px; font-weight: 700; }
        .btn-add { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-add:hover { background: var(--primary-dark); }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 14px 16px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border); white-space: nowrap; }
        td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover { background: #f8fafc; }
        
        /* 狀態標籤 */
        .badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-yellow { background: #fef3c7; color: #92400e; }
        .badge-green { background: #d1fae5; color: #065f46; }
        .badge-red { background: #fee2e2; color: #991b1b; }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-gray { background: #f3f4f6; color: #4b5563; }
        
        /* Modal Styles - 符合圖片樣式 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 16px; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.25); }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .modal-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; color: var(--text); }
        .modal-title i { color: var(--warning); font-size: 16px; }
        .btn-close { width: 32px; height: 32px; border: none; background: transparent; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 18px; }
        .btn-close:hover { background: #f1f5f9; color: var(--text); }
        .modal-body { padding: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group:last-child { margin-bottom: 0; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
        .form-input { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; background: #f8fafc; transition: all 0.2s; color: var(--text); }
        .form-input:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .modal-footer { display: flex; gap: 12px; padding: 20px 24px; border-top: 1px solid var(--border); }
        .btn-cancel { flex: 1; padding: 12px 24px; border: 1px solid var(--border); background: white; border-radius: 10px; font-size: 14px; font-weight: 500; color: var(--text-secondary); cursor: pointer; }
        .btn-cancel:hover { background: var(--bg); }
        .btn-save { flex: 1; padding: 12px 24px; border: none; background: var(--primary); border-radius: 10px; font-size: 14px; font-weight: 600; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save:hover { background: var(--primary-dark); }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; }
        
        /* Status message */
        .status-msg { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; z-index: 2000; animation: slideIn 0.3s ease; }
        .status-msg.success { background: #22c55e; color: white; }
        .status-msg.error { background: #ef4444; color: white; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <!-- 主畫面 - 專案卡片列表 -->
    <div id="mainView">
        <header class="header">
            <div class="header-top">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-industry"></i></div>
                    <div class="logo-text">生產排程管理系統</div>
                    <div class="last-update" id="lastUpdateTime"></div>
                </div>
                <div class="header-actions">
                    <button class="btn-header secondary"><i class="fas fa-home"></i>回主系統</button>
                    <button class="btn-header primary" onclick="alert('新增專案')"><i class="fas fa-plus"></i>新增專案</button>
                </div>
            </div>
        </header>

        <div class="container">
            <div class="projects-grid" id="projectsGrid">
                <div style="text-align:center;padding:60px;color:#666;"><i class="fas fa-spinner fa-spin"></i> 載入中...</div>
            </div>
        </div>
    </div>

    <!-- 工單列表頁面 -->
    <div id="workorderView" class="workorder-view">
        <header class="header">
            <div class="container" style="padding: 20px 24px;">
                <div class="back-btn" onclick="backToProjects()">
                    <i class="fas fa-arrow-left"></i> 返回專案列表
                </div>
                <div class="project-title" id="woProjectTitle">專案名稱</div>
                <div class="project-subtitle" id="woProjectInfo">客戶名稱 / 聯絡人</div>
            </div>
        </header>

        <div class="container">
            <div class="table-container">
                <div class="table-header">
                    <div class="table-title"><i class="fas fa-list"></i> 工單列表</div>
                    <button class="btn-add" onclick="addWorkorder()">
                        <i class="fas fa-plus"></i> 新增工單
                    </button>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th>項次</th>
                            <th>階段狀態</th>
                            <th>負責人</th>
                            <th>廠商</th>
                            <th>提案進度</th>
                            <th>工作日曆天數</th>
                            <th>起始日期</th>
                            <th>結束日期</th>
                            <th>運送天數</th>
                            <th>備註</th>
                        </tr>
                    </thead>
                    <tbody id="workorderTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 編輯專案 Modal - 符合圖片樣式 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">
                    <i class="fas fa-pencil-alt"></i>
                    編輯專案
                </div>
                <button class="btn-close" onclick="closeEditModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="modal-body">
                <input type="hidden" id="editProjectId">
                
                <!-- 案名 -->
                <div class="form-group">
                    <label class="form-label">案名</label>
                    <input type="text" class="form-input" id="editName" placeholder="輸入案名">
                </div>
                
                <!-- 聯絡人公司和姓名 - 兩欄並排 -->
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">聯絡人公司</label>
                        <input type="text" class="form-input" id="editClient" placeholder="輸入公司名稱">
                    </div>
                    <div class="form-group">
                        <label class="form-label">聯絡人姓名</label>
                        <input type="text" class="form-input" id="editContact" placeholder="輸入聯絡人姓名">
                    </div>
                </div>
                
                <!-- 開始日期和交期 - 兩欄並排 -->
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">開始日期</label>
                        <input type="date" class="form-input" id="editStartDate">
                    </div>
                    <div class="form-group">
                        <label class="form-label">交期</label>
                        <input type="date" class="form-input" id="editDeliveryDate">
                    </div>
                </div>
                
                <!-- 數量 -->
                <div class="form-group">
                    <label class="form-label">數量</label>
                    <input type="number" class="form-input" id="editQuantity" placeholder="輸入數量">
                </div>
            </div>
            
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeEditModal()">取消</button>
                <button class="btn-save" id="saveProjectBtn" onclick="saveProjectEdit()">
                    <i class="fas fa-check"></i>
                    更新
                </button>
            </div>
        </div>
    </div>

    <script>
        // Supabase 設定
        const SUPABASE_URL = 'https://rbtkdhmpaiufirvkexwn.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJidGtkaG1wYWl1ZmlydmtleHduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTIxOTQsImV4cCI6MjA5MDQyODE5NH0.T-M79J0-gNoKZF2XLoGuFDHn41VDL46XMyDk99ucZmw';
        
        let supabaseClient = null;
        let projects = [];
        let currentProject = null;

        // 測試工單資料
        let workorders = [
            { id: 1, stageStatus: '提案中', owner: '李明達', vendor: '高柏科技', progress: 30, workDays: 5, startDate: '2024-03-20', endDate: '2024-03-24', shippingDays: 2, notes: '需確認Logo設計' },
            { id: 2, stageStatus: '報價中', owner: '李思涵', vendor: '創新科技', progress: 50, workDays: 4, startDate: '2024-03-25', endDate: '2024-03-28', shippingDays: 1, notes: '待客戶確認' },
            { id: 3, stageStatus: '生產中', owner: '王建國', vendor: '數位生活', progress: 75, workDays: 3, startDate: '2024-03-26', endDate: '2024-03-29', shippingDays: 2, notes: '' }
        ];

        function initSupabase() {
            if (typeof supabase === 'undefined') return false;
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            return true;
        }

        function showStatus(msg, type) {
            const div = document.createElement('div');
            div.className = 'status-msg ' + type;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        async function loadFromSupabase() {
            if (!supabaseClient) {
                if (!initSupabase()) {
                    projects = [
                        { id: 'A0010-260317', name: '20寸/28寸行李箱+logo印刷', client: '高柏科技', contact: 'Joanne', progress: 30, startDate: '2026-03-30', totalQuantity: 7000, deliveryDate: '2025-04-15' },
                        { id: 'A0011-260318', name: '鋁合金手機支架', client: '創新科技', contact: 'Alex', progress: 25, startDate: '2026-03-30', totalQuantity: 5000, deliveryDate: '2025-04-10' },
                        { id: 'A0012-260319', name: 'USB-C 充電線組', client: '數位生活', contact: '小陳', progress: 60, startDate: '2026-03-30', totalQuantity: 20000, deliveryDate: '2025-04-20' }
                    ];
                    renderProjects();
                    updateLastModifiedTime();
                    return;
                }
            }
            
            try {
                document.getElementById('projectsGrid').innerHTML = '<div style="text-align:center;padding:60px;color:#666;"><i class="fas fa-spinner fa-spin"></i> 載入中...</div>';
                
                const { data: ordersData, error: ordersError } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (ordersError) throw ordersError;
                
                projects = (ordersData || []).map(order => ({
                    orderId: order.id,
                    id: order.order_no,
                    name: order.product_name || '未命名產品',
                    client: order.customer_name || '未知客戶',
                    contact: order.contact_person || '',
                    progress: order.customer_progress || 0,
                    startDate: order.created_at ? order.created_at.split('T')[0] : '',
                    totalQuantity: order.quantity || 0,
                    deliveryDate: order.deadline || ''
                }));
                
                renderProjects();
                updateLastModifiedTime();
                
            } catch (error) {
                console.error('載入資料失敗:', error);
                projects = [
                    { id: 'A0010-260317', name: '20寸/28寸行李箱+logo印刷', client: '高柏科技', contact: 'Joanne', progress: 30, startDate: '2026-03-30', totalQuantity: 7000, deliveryDate: '2025-04-15' },
                    { id: 'A0011-260318', name: '鋁合金手機支架', client: '創新科技', contact: 'Alex', progress: 25, startDate: '2026-03-30', totalQuantity: 5000, deliveryDate: '2025-04-10' },
                    { id: 'A0012-260319', name: 'USB-C 充電線組', client: '數位生活', contact: '小陳', progress: 60, startDate: '2026-03-30', totalQuantity: 20000, deliveryDate: '2025-04-20' }
                ];
                renderProjects();
                updateLastModifiedTime();
            }
        }

        function getDayOfWeek(dateStr) {
            if (!dateStr) return '-';
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return '-';
            return '星期' + days[date.getDay()];
        }

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            if (!projects || projects.length === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:60px;color:#666;">暫無資料</div>';
                return;
            }
            grid.innerHTML = projects.map(project => {
                const deliveryDay = getDayOfWeek(project.deliveryDate);
                return `
                <div class="project-card" onclick="viewProject('${project.id}')">
                    <div class="card-header">
                        <span class="project-id">${project.id}</span>
                        <button class="btn-edit-card" onclick="event.stopPropagation(); openEditModal('${project.id}')" title="編輯">
                            <i class="fas fa-edit"></i>
                        </button>
                    </div>
                    <div class="project-name">${project.name}</div>
                    <div class="project-client">
                        <i class="fas fa-building"></i>
                        ${project.client} / ${project.contact}
                    </div>
                    <div class="project-info">
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-calendar"></i> 開始日期</span>
                            <span class="info-value">${project.startDate}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-sort-numeric-up"></i> 數量</span>
                            <span class="info-value">${(project.totalQuantity || 0).toLocaleString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-calendar-check"></i> 交期</span>
                            <span class="info-value">${project.deliveryDate} (${deliveryDay})</span>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${project.progress || 0}%"></div>
                    </div>
                    <div class="progress-text">${project.progress || 0}% 完成</div>
                </div>
            `}).join('');
        }

        // 開啟編輯 Modal
        function openEditModal(id) {
            const project = projects.find(p => p.id === id);
            if (!project) return;
            
            document.getElementById('editProjectId').value = id;
            document.getElementById('editName').value = project.name;
            document.getElementById('editClient').value = project.client;
            document.getElementById('editContact').value = project.contact;
            document.getElementById('editStartDate').value = project.startDate;
            document.getElementById('editDeliveryDate').value = project.deliveryDate;
            document.getElementById('editQuantity').value = project.totalQuantity;
            
            document.getElementById('editModal').classList.add('active');
        }

        // 關閉編輯 Modal
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        // 儲存專案編輯
        async function saveProjectEdit() {
            const id = document.getElementById('editProjectId').value;
            const project = projects.find(p => p.id === id);
            if (!project) return;
            
            const saveBtn = document.getElementById('saveProjectBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 儲存中...';
            
            try {
                // 更新本地資料
                project.name = document.getElementById('editName').value;
                project.client = document.getElementById('editClient').value;
                project.contact = document.getElementById('editContact').value;
                project.startDate = document.getElementById('editStartDate').value;
                project.deliveryDate = document.getElementById('editDeliveryDate').value;
                project.totalQuantity = parseInt(document.getElementById('editQuantity').value) || 0;
                
                // 如果有 Supabase，同步更新
                if (supabaseClient && project.orderId) {
                    const { error } = await supabaseClient
                        .from('orders')
                        .update({
                            quantity: project.totalQuantity,
                            deadline: project.deliveryDate,
                            updated_at: new Date().toISOString()
                        })
                        .eq('id', project.orderId);
                    
                    if (error) throw error;
                }
                
                renderProjects();
                closeEditModal();
                updateLastModifiedTime();
                showStatus('資料已儲存', 'success');
                
            } catch (error) {
                console.error('儲存失敗:', error);
                showStatus('儲存失敗: ' + error.message, 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fas fa-check"></i> 更新';
            }
        }

        // 點擊專案卡片 - 進入工單列表
        function viewProject(id) {
            currentProject = projects.find(p => p.id === id);
            if (!currentProject) return;
            
            document.getElementById('woProjectTitle').textContent = currentProject.name;
            document.getElementById('woProjectInfo').textContent = `${currentProject.client} / ${currentProject.contact}`;
            
            renderWorkorders();
            
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('workorderView').classList.add('active');
        }

        // 返回專案列表
        function backToProjects() {
            document.getElementById('workorderView').classList.remove('active');
            document.getElementById('mainView').style.display = 'block';
            currentProject = null;
        }

        // 渲染工單表格
        function renderWorkorders() {
            const tbody = document.getElementById('workorderTableBody');
            
            tbody.innerHTML = workorders.map((wo, index) => {
                const statusBadge = getStageStatusBadge(wo.stageStatus);
                
                return `
                <tr>
                    <td>${index + 1}</td>
                    <td>${statusBadge}</td>
                    <td>${wo.owner}</td>
                    <td>${wo.vendor}</td>
                    <td>${wo.progress}%</td>
                    <td>${wo.workDays}</td>
                    <td>${wo.startDate}</td>
                    <td>${wo.endDate}</td>
                    <td>${wo.shippingDays}</td>
                    <td>${wo.notes || '-'}</td>
                </tr>
                `;
            }).join('');
        }

        // 取得階段狀態標籤
        function getStageStatusBadge(status) {
            const statusMap = {
                '提案中': '<span class="badge badge-yellow"><i class="fas fa-lightbulb"></i> 提案中</span>',
                '報價中': '<span class="badge badge-blue"><i class="fas fa-file-invoice-dollar"></i> 報價中</span>',
                '待產': '<span class="badge badge-gray"><i class="fas fa-clock"></i> 待產</span>',
                '生產中': '<span class="badge badge-blue"><i class="fas fa-spinner"></i> 生產中</span>',
                '已完成': '<span class="badge badge-green"><i class="fas fa-check"></i> 已完成</span>'
            };
            return statusMap[status] || `<span class="badge badge-gray">${status}</span>`;
        }

        // 新增工單
        function addWorkorder() {
            alert('新增工單功能開發中...');
        }

        // 更新最後更新時間
        function updateLastModifiedTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-TW', { 
                hour12: false,
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            const timeEl = document.getElementById('lastUpdateTime');
            if (timeEl) {
                timeEl.textContent = '最後更新: ' + timeStr;
            }
        }

        // 點擊 modal 外部關閉
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });

        // 頁面載入時初始化
        document.addEventListener('DOMContentLoaded', function() {
            initSupabase();
            loadFromSupabase();
        });
    </script>
</body>
</html>
