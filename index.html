<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生產排程管理系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1; --success: #22c55e; --warning: #f59e0b;
            --bg: #f8fafc; --bg-card: #ffffff; --text: #1e293b;
            --text-secondary: #64748b; --border: #e2e8f0;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 24px; box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }
        .header-top {
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
        }
        .logo { display: flex; align-items: center; gap: 12px; color: white; }
        .logo-icon {
            width: 40px; height: 40px; background: rgba(255,255,255,0.2);
            border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .logo-text { font-size: 20px; font-weight: 700; }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .btn-header {
            padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-header.secondary { background: rgba(255,255,255,0.2); color: white; }
        .btn-header.primary { background: #22c55e; color: white; }
        .search-bar { display: flex; align-items: center; gap: 12px; }
        .search-input {
            flex: 1; padding: 12px 16px; background: white; border: none;
            border-radius: 10px; font-size: 14px; display: flex; align-items: center; gap: 12px;
        }
        .search-input input { border: none; outline: none; font-size: 14px; width: 100%; }
        .btn-search {
            padding: 12px 24px; background: white; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; color: var(--primary); cursor: pointer;
        }
        .btn-clear {
            padding: 12px 20px; background: rgba(255,255,255,0.2); border: none;
            border-radius: 10px; font-size: 14px; font-weight: 600; color: white; cursor: pointer;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .projects-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px;
        }
        .project-card {
            background: white; border-radius: 16px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--border);
            cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
        }
        .project-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--warning);
        }
        .project-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .project-id { font-size: 12px; color: var(--text-secondary); font-family: monospace; }
        .project-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
        .project-client { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 14px; margin-bottom: 12px; }
        .project-info { background: #f8fafc; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed #e2e8f0; }
        .info-row:last-child { border-bottom: none; }
        .info-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
        .info-value { font-size: 13px; font-weight: 600; color: var(--text); }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--success), #4ade80); border-radius: 3px; transition: width 0.5s; }
        .progress-text { text-align: right; font-size: 12px; color: var(--text-secondary); }
        .loading { text-align: center; padding: 60px; color: #666; }
        .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 16px; margin: 20px; color: #dc2626; }
        .btn-edit-card { width: 32px; height: 32px; border: none; background: #f1f5f9; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
        .btn-edit-card:hover { background: var(--primary); color: white; }
    </style>
</head>
<body>
    <div id="mainView">
        <header class="header">
            <div class="header-top">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-industry"></i></div>
                    <div class="logo-text">生產排程管理系統</div>
                </div>
                <div class="header-actions">
                    <button class="btn-header secondary"><i class="fas fa-home"></i>回主系統</button>
                    <button class="btn-header primary" onclick="alert('新增專案')"><i class="fas fa-plus"></i>新增專案</button>
                </div>
            </div>
            <div class="search-bar">
                <div class="search-input"><i class="fas fa-search"></i><input type="text" placeholder="搜尋客戶、產品或聯絡人..."></div>
                <div class="search-input"><i class="fas fa-filter"></i><input type="text" placeholder="進一步篩選..."></div>
                <button class="btn-search"><i class="fas fa-search"></i>搜尋</button>
                <button class="btn-clear">清除</button>
                <button class="btn-header secondary"><i class="fas fa-users"></i>人員查詢</button>
            </div>
        </header>

        <div class="container">
            <div id="errorContainer"></div>
            <div class="projects-grid" id="projectsGrid">
                <div class="loading"><i class="fas fa-spinner fa-spin"></i> 載入中...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        // 測試資料（直接顯示，確認網站運作正常）
        const testProjects = [
            {
                id: 'A0010-260317',
                name: '20寸/28寸行李箱+logo印刷',
                client: '高柏科技',
                contact: '張經理',
                progress: 30,
                startDate: '2026-03-30',
                totalQuantity: 7000,
                deliveryDate: '2025-04-15'
            },
            {
                id: 'A0011-260318',
                name: '鋁合金手機支架',
                client: '創新科技',
                contact: '李小姐',
                progress: 25,
                startDate: '2026-03-30',
                totalQuantity: 5000,
                deliveryDate: '2025-04-10'
            },
            {
                id: 'A0012-260319',
                name: 'USB-C 充電線組',
                client: '數位生活',
                contact: '王先生',
                progress: 60,
                startDate: '2026-03-30',
                totalQuantity: 20000,
                deliveryDate: '2025-04-20'
            }
        ];

        function showError(msg) {
            document.getElementById('errorContainer').innerHTML = 
                '<div class="error-box"><i class="fas fa-exclamation-triangle"></i> ' + msg + '</div>';
        }

        function getDayOfWeek(dateStr) {
            if (!dateStr) return '-';
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return '-';
            return '星期' + days[date.getDay()];
        }

        function renderProjects(projects) {
            const grid = document.getElementById('projectsGrid');
            if (!projects || projects.length === 0) {
                grid.innerHTML = '<div class="loading">暫無資料</div>';
                return;
            }
            grid.innerHTML = projects.map(project => {
                const deliveryDay = getDayOfWeek(project.deliveryDate);
                return `
                <div class="project-card" onclick="alert('查看專案: ${project.id}')">
                    <div class="card-header">
                        <span class="project-id">${project.id}</span>
                        <button class="btn-edit-card" onclick="event.stopPropagation(); alert('編輯: ${project.id}')">
                            <i class="fas fa-edit"></i>
                        </button>
                    </div>
                    <div class="project-name">${project.name}</div>
                    <div class="project-client">
                        <i class="fas fa-building"></i>
                        ${project.client} / ${project.contact}
                    </div>
                    <div class="project-info">
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-calendar"></i> 開始日期</span>
                            <span class="info-value">${project.startDate}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-sort-numeric-up"></i> 數量</span>
                            <span class="info-value">${(project.totalQuantity || 0).toLocaleString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label"><i class="fas fa-calendar-check"></i> 交期</span>
                            <span class="info-value">${project.deliveryDate} (${deliveryDay})</span>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${project.progress || 0}%"></div>
                    </div>
                    <div class="progress-text">${project.progress || 0}% 完成</div>
                </div>
            `}).join('');
        }

        // 頁面載入時先顯示測試資料
        document.addEventListener('DOMContentLoaded', function() {
            console.log('顯示測試資料...');
            renderProjects(testProjects);
            
            // 然後嘗試從 Supabase 載入真實資料
            loadFromSupabase();
        });

        async function loadFromSupabase() {
            try {
                if (typeof supabase === 'undefined') {
                    console.log('Supabase 未載入，使用測試資料');
                    return;
                }
                
                const client = supabase.createClient(
                    'https://rbtkdhmpaiufirvkexwn.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJidGtkaG1wYWl1ZmlydmtleHduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTIxOTQsImV4cCI6MjA5MDQyODE5NH0.T-M79J0-gNoKZF2XLoGuFDHn41VDL46XMyDk99ucZmw'
                );
                
                const { data: orders, error } = await client.from('orders').select('*');
                
                if (error) {
                    console.error('Supabase 錯誤:', error);
                    showError('Supabase 連線失敗: ' + error.message);
                    return;
                }
                
                if (orders && orders.length > 0) {
                    console.log('從 Supabase 載入', orders.length, '筆資料');
                    // 這裡可以轉換並顯示真實資料
                }
            } catch (e) {
                console.error('載入 Supabase 失敗:', e);
            }
        }
    </script>
</body>
</html>
